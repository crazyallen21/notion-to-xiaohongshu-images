<svg xmlns="http://www.w3.org/2000/svg" width="1434" height="336" viewBox="0 0 1434 336" role="img" aria-labelledby="title desc">
  <title id="title">Notion to Xiaohongshu image card demo</title>
  <desc id="desc">Six horizontal Xiaohongshu card previews showing cover, article, list, quote, code, and export checklist layouts in several visual styles.</desc>
  <rect width="1434" height="336" fill="#f7f3ea"/>

  <g font-family="Arial, Helvetica, sans-serif">
    <g transform="translate(24 24)">
      <rect width="216" height="288" fill="#fbfaf6"/>
      <text x="16" y="18" font-size="5.5" fill="#bd4b3f">Notion 内容转小红书图文卡片</text>
      <line x1="18" y1="95" x2="18" y2="154" stroke="#bd4b3f" stroke-width="2"/>
      <text x="28" y="105" font-size="7" fill="#8c8178">Public Demo</text>
      <text x="28" y="130" font-size="24" font-weight="700" fill="#bd4b3f">Notion to XHS</text>
      <text x="28" y="153" font-size="18" font-weight="700" fill="#1e242d">多风格图文卡片</text>
      <text x="28" y="184" font-size="8" fill="#6f766f">从 Notion 或 Markdown 生成适合小红书发布的</text>
      <text x="28" y="198" font-size="8" fill="#6f766f">高分辨率多图卡片。</text>
      <text x="176" y="272" font-size="7" fill="#8a8a84">01 / 06</text>
    </g>

    <g transform="translate(258 24)">
      <rect width="216" height="288" fill="#f8fbff"/>
      <text x="16" y="18" font-size="5.5" fill="#2868a8">Notion 内容转小红书图文卡片</text>
      <text x="174" y="18" font-size="5.5" fill="#9aa7b6">文章页</text>
      <text x="95" y="48" text-anchor="middle" font-size="5.5" font-weight="700" fill="#2868a8">CHAPTER 01</text>
      <text x="69" y="65" font-size="14" font-weight="700" fill="#182536">从长文到卡片</text>
      <text x="28" y="88" font-size="8" fill="#405164">把一篇 Notion 页面整理成移动端阅读节奏。</text>
      <text x="28" y="103" font-size="8" fill="#405164">标题、列表、引用和重点会被保留下来。</text>
      <circle cx="31" cy="128" r="2" fill="#2868a8"/>
      <text x="38" y="131" font-size="8" fill="#26384c">自动识别一级标题作为文章标题</text>
      <circle cx="31" cy="146" r="2" fill="#2868a8"/>
      <text x="38" y="149" font-size="8" fill="#26384c">按章节拆成连续卡片</text>
      <circle cx="31" cy="164" r="2" fill="#2868a8"/>
      <text x="38" y="167" font-size="8" fill="#26384c">输出单页 PNG、contact sheet 和 manifest</text>
      <line x1="62" y1="205" x2="154" y2="205" stroke="#d8e3ef"/>
      <text x="78" y="226" font-size="14" font-weight="700" fill="#28394f">适合的内容形态</text>
      <text x="176" y="272" font-size="7" fill="#8a96a4">02 / 06</text>
    </g>

    <g transform="translate(492 24)">
      <rect width="216" height="288" fill="#fbfaf6"/>
      <text x="16" y="18" font-size="5.5" fill="#2f8f6f">Notion 内容转小红书图文卡片</text>
      <text x="174" y="18" font-size="5.5" fill="#97a59e">代码页</text>
      <line x1="18" y1="46" x2="18" y2="76" stroke="#2f8f6f" stroke-width="2"/>
      <text x="28" y="58" font-size="13" font-weight="700" fill="#1e242d">常见元素</text>
      <text x="31" y="88" font-size="8" fill="#26352e">1</text>
      <text x="42" y="88" font-size="8" fill="#26352e">封面标题和副标题</text>
      <text x="31" y="106" font-size="8" fill="#26352e">2</text>
      <text x="42" y="106" font-size="8" fill="#26352e">章节标题和过渡句</text>
      <text x="31" y="124" font-size="8" fill="#26352e">3</text>
      <text x="42" y="124" font-size="8" fill="#26352e">短段落和重点高亮</text>
      <text x="31" y="142" font-size="8" fill="#26352e">4</text>
      <text x="42" y="142" font-size="8" fill="#26352e">有序列表、无序列表与引用</text>
      <text x="31" y="160" font-size="8" fill="#26352e">5</text>
      <text x="42" y="160" font-size="8" fill="#26352e">代码块或命令片段</text>
      <text x="95" y="186" text-anchor="middle" font-size="5.5" font-weight="700" fill="#2f8f6f">LAYOUT_PRESET=compact</text>
      <rect x="28" y="196" width="160" height="34" rx="2" fill="#222b35"/>
      <text x="38" y="208" font-size="5.6" fill="#cbd5e1">CONTENT_PATH=src/content.md \</text>
      <text x="38" y="219" font-size="5.6" fill="#cbd5e1">DIST_DIR=dist/article \</text>
      <text x="38" y="230" font-size="5.6" fill="#cbd5e1">node src/render.mjs</text>
      <text x="176" y="272" font-size="7" fill="#8a8a84">03 / 06</text>
    </g>

    <g transform="translate(726 24)">
      <rect width="216" height="288" fill="#f8fbff"/>
      <text x="16" y="18" font-size="5.5" fill="#7b4fd6">Notion 内容转小红书图文卡片</text>
      <text x="174" y="18" font-size="5.5" fill="#9aa7b6">结果页</text>
      <text x="95" y="70" text-anchor="middle" font-size="5.5" font-weight="700" fill="#7b4fd6">CHAPTER 04</text>
      <text x="82" y="89" font-size="14" font-weight="700" fill="#28394f">输出结果</text>
      <text x="36" y="116" font-size="8" fill="#405164">最终结果是一组适合小红书发布的高分辨率 PNG。</text>
      <text x="36" y="131" font-size="8" fill="#405164">你可以直接拿单页图片发布，也可以用 contact sheet</text>
      <text x="36" y="146" font-size="8" fill="#405164">快速检查整组视觉节奏。</text>
      <line x1="30" y1="236" x2="186" y2="236" stroke="#d8e3ef"/>
      <text x="176" y="272" font-size="7" fill="#8a96a4">04 / 06</text>
    </g>

    <g transform="translate(960 24)">
      <rect width="216" height="288" fill="#fbfaf6"/>
      <text x="16" y="18" font-size="5.5" fill="#b7791f">Notion 内容转小红书图文卡片</text>
      <text x="174" y="18" font-size="5.5" fill="#9b8f7e">信息页</text>
      <text x="95" y="48" text-anchor="middle" font-size="5.5" font-weight="700" fill="#b7791f">CHAPTER 02</text>
      <text x="69" y="65" font-size="14" font-weight="700" fill="#1e242d">信息层级</text>
      <text x="28" y="89" font-size="8" fill="#4f463c">封面负责主题，章节页负责转场，正文页负责解释，</text>
      <text x="28" y="104" font-size="8" fill="#4f463c">列表页负责扫描，引用页负责强调。</text>
      <circle cx="31" cy="132" r="2" fill="#b7791f"/>
      <text x="38" y="135" font-size="8" fill="#2f2b25">标题、段落和列表自动分层</text>
      <circle cx="31" cy="151" r="2" fill="#b7791f"/>
      <text x="38" y="154" font-size="8" fill="#2f2b25">重点内容有清晰视觉锚点</text>
      <circle cx="31" cy="170" r="2" fill="#b7791f"/>
      <text x="38" y="173" font-size="8" fill="#2f2b25">导出前可通过 contact sheet 预览整组节奏</text>
      <line x1="62" y1="205" x2="154" y2="205" stroke="#e7e1d5"/>
      <text x="78" y="226" font-size="14" font-weight="700" fill="#313842">导出清单</text>
      <text x="176" y="272" font-size="7" fill="#8a8a84">05 / 06</text>
    </g>

    <g transform="translate(1194 24)">
      <rect width="216" height="288" fill="#f8fbff"/>
      <text x="16" y="18" font-size="5.5" fill="#3f4a54">Notion 内容转小红书图文卡片</text>
      <text x="174" y="18" font-size="5.5" fill="#9aa7b6">清单页</text>
      <line x1="18" y1="46" x2="18" y2="76" stroke="#3f4a54" stroke-width="2"/>
      <text x="28" y="58" font-size="13" font-weight="700" fill="#182536">导出清单</text>
      <text x="31" y="88" font-size="8" fill="#26384c">1</text>
      <text x="42" y="88" font-size="8" fill="#26384c">单页高分辨率 PNG</text>
      <text x="31" y="106" font-size="8" fill="#26384c">2</text>
      <text x="42" y="106" font-size="8" fill="#26384c">横向 contact sheet 预览</text>
      <text x="31" y="124" font-size="8" fill="#26384c">3</text>
      <text x="42" y="124" font-size="8" fill="#26384c">记录尺寸和页数的 manifest</text>
      <text x="31" y="142" font-size="8" fill="#26384c">4</text>
      <text x="42" y="142" font-size="8" fill="#26384c">可复查的 HTML 排版页面</text>
      <rect x="28" y="184" width="160" height="34" rx="2" fill="#222b35"/>
      <text x="38" y="196" font-size="5.6" fill="#cbd5e1">OUTPUT_SLUG=xhs-article \</text>
      <text x="38" y="207" font-size="5.6" fill="#cbd5e1">THEME=blue \</text>
      <text x="38" y="218" font-size="5.6" fill="#cbd5e1">node src/render.mjs</text>
      <text x="95" y="244" text-anchor="middle" font-size="14" font-weight="700" fill="#28394f">多图卡片发布</text>
      <text x="176" y="272" font-size="7" fill="#8a96a4">06 / 06</text>
    </g>
  </g>
</svg>
